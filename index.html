<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños, Kevin! 🏆</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* FONDO: Cancha de fútbol con CSS puro */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a6d1a; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px), 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.7) 1px, transparent 1px);
            background-size: 100px 100px, 20px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Líneas de la cancha (z-index bajo) */
        body::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 8px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 100%;
            background-color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        /* Tarjeta principal con Efecto Cristal */
        .card {
            /* Opacidad reducida a 0.7 para ver el confeti detrás */
            background-color: rgba(26, 26, 46, 0.7); 
            /* Blur para que lo que pase por detrás se vea difuminado y pro */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 420px;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10; 
            border: 2px solid rgba(241, 196, 15, 0.5); /* Borde dorado semi-transparente */
        }

        h1 {
            color: #f1c40f;
            margin-top: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            font-size: 2.3rem;
        }

        p { color: #ffffff; font-size: 1.1rem; line-height: 1.4; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }

        .icon-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 3rem;
        }

        .trophy-icon {
            color: #f1c40f;
            animation: pulsate 2s infinite ease-in-out;
        }

        .ball-icon { color: #ecf0f1; font-size: 2.5rem; align-self: flex-end; }

        @keyframes pulsate {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #mensaje-secreto {
            display: none;
            margin-top: 25px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #f1c40f;
        }

        #mensaje-secreto p { margin: 10px 0; font-weight: bold; }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
            z-index: 11;
        }

        button:hover { background-color: #2ecc71; transform: translateY(-3px); }
        button:active { transform: translateY(1px); }

        .small-trophy { font-size: 1.3rem; color: #f1c40f; vertical-align: middle; }

    </style>
</head>
<body>

    <audio id="sonido-estadio" src="./celebracion.mp3" preload="auto" loop></audio>

    <div class="card">
        <div class="icon-container">
            <span class="ball-icon">⚽</span>
            <span class="trophy-icon">🏆</span>
            <span class="ball-icon">⚽</span>
        </div>
        
        <h1>¡Feliz Cumpleaños, Kev! <span class="small-trophy">🏆</span></h1>
        <p>¡Te deseo lo mejor Bro!</p>
        <button onclick="revelarMensaje()">Toca aqui!!</button>
        
        <div id="mensaje-secreto">
            <p><strong>De: Tu pana Mauri </strong></p>
            <p>Te deseo muchas felicidades mañana en tu cumple.</p>
            <p>¡Espero que este año siga trayéndote alegrías y muchos éxitos!</p>
            <p>¡Un fuerte abrazo Hermano del alma! 🎉🎁⚽</p>
        </div>
    </div>

    <script>
        let intervalConfetti;
        let intervalFuegos;

        function lanzarLluviaAbundante() {
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 5 }; 

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            intervalConfetti = setInterval(function() {
              confetti({
                ...defaults,
                particleCount: 60,
                origin: { x: randomInRange(0.1, 0.4), y: Math.random() - 0.3 },
                colors: ['#27ae60', '#f1c40f', '#ffffff']
              });
              confetti({
                ...defaults,
                particleCount: 60,
                origin: { x: randomInRange(0.6, 0.9), y: Math.random() - 0.3 },
                colors: ['#27ae60', '#f1c40f', '#ffffff']
              });
            }, 400); 
        }

        function lanzarFuegosArtificiales() {
            intervalFuegos = setInterval(function() {
                const fireworkDefaults = {
                    particleCount: 100,
                    startVelocity: 45,
                    spread: 180,
                    gravity: 1.2,
                    drift: 0.1,
                    scalar: 1,
                    zIndex: 5, 
                    colors: ['#ffd700', '#ffc107', '#ffffff', '#e67e22']
                };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                confetti({
                    ...fireworkDefaults,
                    origin: { x: randomInRange(0.15, 0.85), y: randomInRange(0.2, 0.5) } 
                });

            }, 1000);
        }

        function revelarMensaje() {
            const mensaje = document.getElementById('mensaje-secreto');
            const boton = document.querySelector('button');
            const sonido = document.getElementById('sonido-estadio');
            
            if (mensaje.style.display === 'none' || mensaje.style.display === '') {
                mensaje.style.display = 'block';
                boton.textContent = '¡Felicidades!';
                sonido.play().catch(e => console.log("Error con el sonido:", e));
                lanzarLluviaAbundante(); 
                lanzarFuegosArtificiales(); 
            } else {
                mensaje.style.display = 'none';
                boton.textContent = '¡Comenzar Celebración!';
                sonido.pause();
                clearInterval(intervalConfetti); 
                clearInterval(intervalFuegos);
            }
        }
    </script>
</body>
</html>
