<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Kev! 🎉</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #228B22; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px), 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.7) 1px, transparent 1px);
            background-size: 100px 100px, 20px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 8px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background-color: rgba(26, 26, 46, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 420px;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
            border: 3px solid #f1c40f;
        }

        h1 {
            color: #f1c40f;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p { color: #ecf0f1; }

        .icon-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 3rem;
        }

        .trophy-icon {
            color: #f1c40f;
            animation: pulsate 2s infinite ease-in-out;
        }

        @keyframes pulsate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #mensaje-secreto {
            display: none;
            margin-top: 25px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #f1c40f;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <audio id="sonido-estadio" src="celebracion.mp3" preload="auto" loop></audio>

    <div class="card">
        <div class="icon-container">
            <span>⚽</span>
            <span class="trophy-icon">🏆</span>
            <span>⚽</span>
        </div>
        
        <h1>¡Feliz Cumpleaños, Kev!</h1>
        <p>¡Eres el MVP de la familia!</p>
        <button onclick="revelarMensaje()">Abrir el Vestuario...</button>
        
        <div id="mensaje-secreto">
            <p><strong>¡Felicidades, Campeón!</strong></p>
            <p>Que este año sea una temporada llena de goles y muchas alegrías.</p>
            <p>¡Un fuerte abrazo de gol! 🎉⚽</p>
        </div>
    </div>

    <script>
        let intervalConfetti;

        function lanzarLluvia() {
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            // Disparos desde los lados para que parezca que llueve en toda la pantalla
            intervalConfetti = setInterval(function() {
              confetti({
                ...defaults,
                particleCount: 40,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                colors: ['#27ae60', '#f1c40f', '#ffffff']
              });
              confetti({
                ...defaults,
                particleCount: 40,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                colors: ['#27ae60', '#f1c40f', '#ffffff']
              });
            }, 500); // Se repite cada medio segundo
        }

        function revelarMensaje() {
            const mensaje = document.getElementById('mensaje-secreto');
            const boton = document.querySelector('button');
            const sonido = document.getElementById('sonido-estadio');
            
            if (mensaje.style.display === 'none' || mensaje.style.display === '') {
                mensaje.style.display = 'block';
                boton.textContent = '¡Felicidades!';
                sonido.play();
                lanzarLluvia(); // Inicia la lluvia constante
            } else {
                mensaje.style.display = 'none';
                boton.textContent = 'Abrir el Vestuario...';
                sonido.pause();
                clearInterval(intervalConfetti); // Detiene la lluvia
            }
        }
    </script>
</body>
</html>
